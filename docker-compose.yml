# ============================================================
# Glow Beauty Goals — Docker Compose (Production)
# Usage: docker compose up -d --build
# ============================================================

services:
  # ---- PostgreSQL ----
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: shopdb
      POSTGRES_USER: shopadmin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-GlowBeauty2026!}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopadmin -d shopdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Go Backend API ----
  backend:
    build: ./backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://shopadmin:${DB_PASSWORD:-GlowBeauty2026!}@db:5432/shopdb?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-production}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-change-me-admin-jwt-secret-production}
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}
      PORT: 8080
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

  # ---- Next.js Frontend ----
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_TIKTOK_PIXEL_ID: ${NEXT_PUBLIC_TIKTOK_PIXEL_ID:-}
        NEXT_PUBLIC_META_PIXEL_ID: ${NEXT_PUBLIC_META_PIXEL_ID:-}
        NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME:-}
        NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: ${NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET:-}
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
